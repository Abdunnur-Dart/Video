<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Глобальный Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative; // NEW - для позиционирования кнопки настроек
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            position: relative; // NEW
            display: flex; // NEW
            justify-content: center; // NEW
            align-items: center; // NEW
        }

        /* NEW - Кнопка настроек */
        .settings-btn {
            position: absolute;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .username {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
            font-size: 20px;
        }

        .timestamp {
            font-size: 16px;
            color: #999;
        }

        .message-text {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-wrap: break-word;
            font-size: 18px;
            line-height: 1.6;
        }

        /* Стиль для сообщений других пользователей */
        .message.other-user .message-text {
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(102, 126, 234, 0.3);
        }

        .input-container {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #usernameInput {
            width: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 18px;
        }

        #messageInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 18px;
        }

        #usernameInput:focus,
        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
            touch-action: manipulation;
        }

        #sendButton:hover {
            transform: scale(1.05);
        }

        #sendButton:active {
            transform: scale(0.95);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 20px;
        }

        /* Typing indicator styles */
        .typing-indicator {
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            min-height: 40px;
            display: flex;
            align-items: center;
            font-size: 16px;
            color: #666;
            font-style: italic;
        }

        .typing-indicator.hidden {
            display: none;
        }

        .typing-dots {
            display: inline-flex;
            margin-left: 8px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background-color: #667eea;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typingBounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* NEW - Стили для модального окна настроек */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-modal.active {
            display: flex;
        }

        .settings-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .settings-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .color-inputs {
            display: flex;
            gap: 10px;
        }

        .color-input-wrapper {
            flex: 1;
        }

        .color-input-wrapper label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #777;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
        }

        .settings-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .settings-btn-save,
        .settings-btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .settings-btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .settings-btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .settings-btn-save:hover,
        .settings-btn-cancel:hover {
            transform: scale(1.05);
        }

        /* Mobile responsive styles */
        @media (max-width: 768px) {
            body {
                font-size: 16px;
            }

            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .chat-header {
                padding: 15px;
                font-size: 24px;
            }

            .messages-container {
                padding: 15px;
            }

            .message-text {
                padding: 12px 15px;
                font-size: 18px; // CHANGED - базовый размер, будет переопределен настройками
            }

            .username {
                font-size: 16px;
            }

            .timestamp {
                font-size: 14px;
            }

            .input-container {
                flex-direction: column;
                padding: 15px;
                gap: 10px;
            }

            #usernameInput {
                width: 100%;
                margin-right: 0;
                font-size: 16px;
            }

            #messageInput {
                margin-right: 0;
                font-size: 16px;
            }

            #sendButton {
                width: 100%;
                padding: 15px;
            }

            .typing-indicator {
                padding: 8px 15px;
                font-size: 14px;
            }

            .settings-btn {
                right: 10px;
                font-size: 20px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            💬 Глобальный Чат
            <!-- NEW - Кнопка настроек -->
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div class="loading">Загрузка сообщений...</div>
        </div>
        
        <!-- Typing indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
            <span id="typingText"></span>
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="usernameInput" 
                placeholder="Ваше имя" 
                maxlength="20"
            >
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Введите сообщение..." 
                maxlength="500000"
            >
            <button id="sendButton">Отправить</button>
        </div>
    </div>

    <!-- NEW - Модальное окно настроек -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-title">Настройки чата</div>
            
            <div class="setting-item">
                <label class="setting-label">Цвет градиента сообщений собеседника</label>
                <div class="color-inputs">
                    <div class="color-input-wrapper">
                        <label>Начальный цвет</label>
                        <input type="color" id="gradientStart" value="#667eea">
                    </div>
                    <div class="color-input-wrapper">
                        <label>Конечный цвет</label>
                        <input type="color" id="gradientEnd" value="#f093fb">
                    </div>
                </div>
            </div>

            <div class="setting-item">
                <label class="setting-label">Размер шрифта сообщений: <span id="fontSizeValue">18</span>px</label>
                <input type="range" id="fontSizeRange" min="14" max="24" value="18">
            </div>

            <div class="settings-buttons">
                <button class="settings-btn-save" id="saveSettings">Сохранить</button>
                <button class="settings-btn-cancel" id="cancelSettings">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            query, 
            orderBy, 
            serverTimestamp,
            doc,
            setDoc,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAOqH-YIBk3dJqFH-n11BZ2ftvTb-rLHXQ",
            authDomain: "webrtcch.firebaseapp.com",
            projectId: "webrtcch",
            storageBucket: "webrtcch.firebasestorage.app",
            messagingSenderId: "446715908287",
            appId: "1:446715908287:web:f773456e263ffd19b6f60a",
            measurementId: "G-BY3QV8WZ30"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // DOM elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const usernameInput = document.getElementById('usernameInput');
        const sendButton = document.getElementById('sendButton');
        // Typing indicator elements
        const typingIndicator = document.getElementById('typingIndicator');
        const typingText = document.getElementById('typingText');
        
        // NEW - Элементы настроек
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const gradientStart = document.getElementById('gradientStart');
        const gradientEnd = document.getElementById('gradientEnd');
        const fontSizeRange = document.getElementById('fontSizeRange');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const cancelSettingsBtn = document.getElementById('cancelSettings');

        // NEW - Загрузка настроек из localStorage
        let userSettings = JSON.parse(localStorage.getItem('chatSettings')) || {
            gradientStart: '#667eea',
            gradientEnd: '#f093fb',
            fontSize: 18
        };

        // NEW - Применение настроек
        function applySettings() {
            // Обновляем CSS переменные или стили напрямую
            const style = document.createElement('style');
            style.id = 'user-settings-style';
            
            // Удаляем старый стиль если есть
            const oldStyle = document.getElementById('user-settings-style');
            if (oldStyle) {
                oldStyle.remove();
            }
            
            style.textContent = `
                .message.other-user .message-text {
                    background: linear-gradient(135deg, ${userSettings.gradientStart} 0%, ${userSettings.gradientEnd} 100%) !important;
                }
                .message-text {
                    font-size: ${userSettings.fontSize}px !important;
                }
            `;
            document.head.appendChild(style);
        }

        // NEW - Инициализация настроек при загрузке
        applySettings();
        
        // NEW - Установка значений в поля настроек
        gradientStart.value = userSettings.gradientStart;
        gradientEnd.value = userSettings.gradientEnd;
        fontSizeRange.value = userSettings.fontSize;
        fontSizeValue.textContent = userSettings.fontSize;

        // Load username from localStorage
        const savedUsername = localStorage.getItem('chatUsername');
        if (savedUsername) {
            usernameInput.value = savedUsername;
        }

        // Generate or load unique user ID for typing indicator
        let userId = localStorage.getItem('chatUserId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chatUserId', userId);
        }

        // Reference to messages collection
        const messagesRef = collection(db, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));

        // Listen for real-time updates
        let isFirstLoad = true;
        
        onSnapshot(q, (snapshot) => {
            if (isFirstLoad) {
                messagesContainer.innerHTML = '';
                isFirstLoad = false;
            }

            snapshot.docChanges().forEach((change) => {
                if (change.type === 'added') {
                    const message = change.doc.data();
                    displayMessage(message);
                }
            });

            // Auto-scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, (error) => {
            console.error('Ошибка подключения к Firestore:', error);
            messagesContainer.innerHTML = '<div class="loading">Ошибка загрузки сообщений. Проверьте подключение к интернету.</div>';
        });

        // Display message in chat
        function displayMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            // NEW - Определяем, является ли сообщение от другого пользователя
            const currentUsername = usernameInput.value.trim();
            if (message.username && message.username !== currentUsername) {
                messageDiv.classList.add('other-user');
            }

            const timestamp = message.timestamp ? 
                new Date(message.timestamp.toDate()).toLocaleString('ru-RU') : 
                '...';

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="username">${escapeHtml(message.username)}</span>
                    <span class="timestamp">${timestamp}</span>
                </div>
                <div class="message-text">${escapeHtml(message.text)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send message
        async function sendMessage() {
            const username = usernameInput.value.trim();
            const text = messageInput.value.trim();

            if (!username) {
                alert('Пожалуйста, введите ваше имя');
                usernameInput.focus();
                return;
            }

            if (!text) {
                return;
            }

            // Save username to localStorage
            localStorage.setItem('chatUsername', username);

            try {
                await addDoc(messagesRef, {
                    username: username,
                    text: text,
                    timestamp: serverTimestamp()
                });

                messageInput.value = '';
                messageInput.focus();
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Ошибка при отправке сообщения');
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                messageInput.focus();
            }
        });

        // Typing indicator functionality
        const typingRef = collection(db, 'typing');
        let typingTimeout = null;
        let currentTypingUsers = new Map();

        // Update typing status in Firestore
        async function updateTypingStatus(isTyping) {
            const username = usernameInput.value.trim();
            if (!username) return;

            const userTypingRef = doc(typingRef, userId);

            try {
                if (isTyping) {
                    await setDoc(userTypingRef, {
                        username: username,
                        userId: userId,
                        timestamp: Date.now()
                    });
                } else {
                    await deleteDoc(userTypingRef);
                }
            } catch (error) {
                console.warn('Typing indicator unavailable:', error.message);
            }
        }

        // Listen for typing indicators
        onSnapshot(query(typingRef), (snapshot) => {
            currentTypingUsers.clear();
            
            const now = Date.now();
            
            snapshot.forEach((docSnapshot) => {
                const data = docSnapshot.data();
                // Фильтруем только активных пользователей (печатали последние 3 секунды)
                if (data.userId !== userId && data.username && data.timestamp && (now - data.timestamp) < 3000) {
                    currentTypingUsers.set(data.userId, data.username);
                }
            });

            updateTypingDisplay();
        }, (error) => {
            console.warn('Typing listener error:', error.message);
        });

        // Update typing display
        function updateTypingDisplay() {
            const typingUsers = Array.from(currentTypingUsers.values());
            
            if (typingUsers.length === 0) {
                typingIndicator.classList.add('hidden');
                return;
            }

            let text = '';
            if (typingUsers.length === 1) {
                // NEW - Показываем конкретное имя
                text = `${typingUsers[0]} печатает`;
            } else if (typingUsers.length === 2) {
                text = `${typingUsers[0]} и ${typingUsers[1]} печатают`;
            } else {
                text = `${typingUsers.length} человек печатают`;
            }

            typingText.textContent = text;
            typingIndicator.classList.remove('hidden');
        }

        // Handle input events for typing indicator
        messageInput.addEventListener('input', () => {
            updateTypingStatus(true);
            
            // Clear existing timeout
            if (typingTimeout) {
                clearTimeout(typingTimeout);
            }

            // Set timeout to clear typing status
            typingTimeout = setTimeout(() => {
                updateTypingStatus(false);
            }, 2000);
        });

        // Clear typing status when user leaves or sends message
        window.addEventListener('beforeunload', () => {
            updateTypingStatus(false);
        });

        // Also clear when message is sent
        const originalSendMessage = sendMessage;
        sendMessage = async function() {
            updateTypingStatus(false);
            if (typingTimeout) {
                clearTimeout(typingTimeout);
            }
            await originalSendMessage();
        };

        // NEW - Обработчики для настроек
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
        });

        cancelSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
            // Восстанавливаем значения из сохраненных настроек
            gradientStart.value = userSettings.gradientStart;
            gradientEnd.value = userSettings.gradientEnd;
            fontSizeRange.value = userSettings.fontSize;
            fontSizeValue.textContent = userSettings.fontSize;
        });

        fontSizeRange.addEventListener('input', (e) => {
            fontSizeValue.textContent = e.target.value;
        });

        saveSettingsBtn.addEventListener('click', () => {
            // Сохраняем новые настройки
            userSettings = {
                gradientStart: gradientStart.value,
                gradientEnd: gradientEnd.value,
                fontSize: parseInt(fontSizeRange.value)
            };
            
            localStorage.setItem('chatSettings', JSON.stringify(userSettings));
            applySettings();
            settingsModal.classList.remove('active');
        });

        // Закрытие модального окна при клике вне его
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
            }
        });
    </script>
</body>
</html>

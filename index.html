<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальный Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .username {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
            font-size: 20px;
        }

        .timestamp {
            font-size: 16px;
            color: #999;
        }

        .message-text {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            word-wrap: break-word;
            font-size: 18px;
            line-height: 1.6;
        }

        .input-container {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #usernameInput {
            width: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 18px;
        }

        #messageInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-right: 10px;
            font-size: 18px;
        }

        #usernameInput:focus,
        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #sendButton:hover {
            transform: scale(1.05);
        }

        #sendButton:active {
            transform: scale(0.95);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 20px;
        }

        .notification-permission {
            background: #fff3cd;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .notification-permission button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            💬 Глобальный Чат
        </div>
        
        <!-- Уведомление о разрешении -->
        <div id="notificationPermission" class="notification-permission" style="display: none;">
            🔔 Разрешите уведомления для получения сообщений
            <button onclick="requestNotificationPermission()">Разрешить</button>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div class="loading">Загрузка сообщений...</div>
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                id="usernameInput" 
                placeholder="Ваше имя" 
                maxlength="20"
            >
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Введите сообщение..." 
                maxlength="500"
            >
            <button id="sendButton">Отправить</button>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            query, 
            orderBy, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { 
            getMessaging, 
            getToken, 
            onMessage 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAOqH-YIBk3dJqFH-n11BZ2ftvTb-rLHXQ",
            authDomain: "webrtcch.firebaseapp.com",
            projectId: "webrtcch",
            storageBucket: "webrtcch.firebasestorage.app",
            messagingSenderId: "446715908287",
            appId: "1:446715908287:web:f773456e263ffd19b6f60a",
            measurementId: "G-BY3QV8WZ30"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);

        // DOM elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const usernameInput = document.getElementById('usernameInput');
        const sendButton = document.getElementById('sendButton');
        const notificationPermissionDiv = document.getElementById('notificationPermission');

        // Load username from localStorage
        const savedUsername = localStorage.getItem('chatUsername');
        if (savedUsername) {
            usernameInput.value = savedUsername;
        }

        // Проверка поддержки уведомлений
        function checkNotificationSupport() {
            if ('Notification' in window) {
                if (Notification.permission === 'default') {
                    notificationPermissionDiv.style.display = 'block';
                } else if (Notification.permission === 'granted') {
                    setupFCM();
                }
            }
        }

        // Запрос разрешения на уведомления
        window.requestNotificationPermission = async function() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationPermissionDiv.style.display = 'none';
                    setupFCM();
                    console.log('Разрешение на уведомления получено');
                }
            } catch (error) {
                console.error('Ошибка при запросе разрешения:', error);
            }
        };

        // Настройка FCM
        async function setupFCM() {
            try {
                // Получение токена FCM
                const token = await getToken(messaging, {
vapidKey: 'BM85kMfDPIAfeHcKG2kul2EfhwHhROWVs4IAf1oQtSIB-R7X-jchFgh3cWZOBOOg2Em2kJSLIZw8oyT37eAC1DA'
                });
                
                console.log('FCM Token:', token);
                
                // Сохранение токена в Firestore (опционально)
                if (token) {
                    await saveTokenToFirestore(token);
                }
                
                // Обработка сообщений в foreground
                onMessage(messaging, (payload) => {
                    console.log('Получено сообщение:', payload);
                    showLocalNotification(payload);
                });
                
            } catch (error) {
                console.error('Ошибка настройки FCM:', error);
            }
        }

        // Сохранение токена в Firestore
        async function saveTokenToFirestore(token) {
            try {
                const tokensRef = collection(db, 'fcm_tokens');
                await addDoc(tokensRef, {
                    token: token,
                    timestamp: serverTimestamp(),
                    userAgent: navigator.userAgent
                });
            } catch (error) {
                console.error('Ошибка сохранения токена:', error);
            }
        }

        // Показ локального уведомления
        function showLocalNotification(payload) {
            if (Notification.permission === 'granted') {
                const notification = new Notification(payload.notification?.title || 'Новое сообщение', {
                    body: payload.notification?.body || payload.data?.text || 'У вас новое сообщение',
                    icon: '/icon.png', // Путь к иконке
                    badge: '/badge.png' // Путь к бейджу
                });
                
                notification.onclick = () => {
                    window.focus();
                    notification.close();
                };
            }
        }

        // Reference to messages collection
        const messagesRef = collection(db, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));

        // Listen for real-time updates
        let isFirstLoad = true;
        let lastMessageId = null;
        
        onSnapshot(q, (snapshot) => {
            if (isFirstLoad) {
                messagesContainer.innerHTML = '';
                isFirstLoad = false;
            }

            snapshot.docChanges().forEach((change) => {
                if (change.type === 'added') {
                    const message = change.doc.data();
                    const messageId = change.doc.id;
                    
                    // Показываем уведомление только для новых сообщений (не при первой загрузке)
                    if (!isFirstLoad && messageId !== lastMessageId) {
                        const currentUsername = usernameInput.value.trim();
                        // Не показывать уведомление, если это наше собственное сообщение
                        if (message.username !== currentUsername) {
                            showBrowserNotification(message);
                        }
                    }
                    
                    displayMessage(message);
                    lastMessageId = messageId;
                }
            });

            // Auto-scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        // Показ браузерного уведомления при новом сообщении
        function showBrowserNotification(message) {
            if (Notification.permission === 'granted') {
                const notification = new Notification(`💬 ${message.username}`, {
                    body: message.text,
                    icon: '/icon.png',
                    tag: 'chat-message' // Чтобы не дублировать уведомления
                });
                
                notification.onclick = () => {
                    window.focus();
                    notification.close();
                };
            }
        }

        // Display message in chat
        function displayMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const timestamp = message.timestamp ? 
                new Date(message.timestamp.toDate()).toLocaleString('ru-RU') : 
                '...';

            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="username">${escapeHtml(message.username)}</span>
                    <span class="timestamp">${timestamp}</span>
                </div>
                <div class="message-text">${escapeHtml(message.text)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send message
        async function sendMessage() {
            const username = usernameInput.value.trim();
            const text = messageInput.value.trim();

            if (!username) {
                alert('Пожалуйста, введите ваше имя');
                usernameInput.focus();
                return;
            }

            if (!text) {
                return;
            }

            // Save username to localStorage
            localStorage.setItem('chatUsername', username);

            try {
                await addDoc(messagesRef, {
                    username: username,
                    text: text,
                    timestamp: serverTimestamp()
                });

                messageInput.value = '';
                messageInput.focus();
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Ошибка при отправке сообщения');
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                messageInput.focus();
            }
        });

        // Проверяем поддержку уведомлений при загрузке
        checkNotificationSupport();
    </script>
</body>
</html>s
